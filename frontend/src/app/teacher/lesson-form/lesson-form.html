<div class="lesson-container">
  <h2>📘 Subcapitole pentru capitol {{ moduleId }}</h2>

  <form [formGroup]="lessonForm" class="lesson-form" (ngSubmit)="addLesson()">

    <div>
      <label>Titlu subcapitol</label>
      <input type="text" formControlName="title" placeholder="Ex: Introducere în Drept Civil" />
    </div>

    <div>
      <label>Conținut</label>
      <textarea formControlName="content" placeholder="Adaugă descrierea sau materialul lecției..."></textarea>
    </div>

    <div>
      <label>Link Video (opțional)</label>
      <input type="text" formControlName="videoUrl" placeholder="https://youtube.com/..." />
    </div>

    <div>
      <label>Ordinea subcapitolului</label>
      <input type="number" formControlName="orderIndex" />
    </div>

    <button type="submit" [disabled]="lessonForm.invalid">➕ Adaugă subcapitol</button>
  </form>

  <div class="lessons-list" *ngIf="lessons.length > 0">
    <h3>📚 Subcapitole existente</h3>

    <div class="lesson-item" *ngFor="let lesson of lessons">
      <strong>{{ lesson.OrderIndex }}. {{ lesson.Title }}</strong>

      <button (click)="deleteLesson(lesson.id)">Șterge</button>
    </div>
  </div>
</div>
