<div class="lesson-edit-container">
  <div class="lesson-edit-header">
    <h2>Editare Subcapitol</h2>
    <p>Actualizează informațiile lecției</p>
  </div>

  <div *ngIf="loading" class="loading-state">
    Se încarcă datele...
  </div>

  <form *ngIf="!loading" [formGroup]="lessonForm" (ngSubmit)="saveLesson()" class="lesson-form">

    <div class="form-group">
      <label>Titlu</label>
      <input formControlName="Title">
    </div>

    <div class="form-group">
      <label>Conținut</label>
      <textarea formControlName="Content"></textarea>
    </div>

    <div class="form-group">
      <label>Document (PDF, DOCX, PPTX)</label>
      
      <div *ngIf="lessonForm.get('DocumentUrl')?.value" class="current-file-info">
        <p>Fișier actual: 
          <a [href]="'http://localhost:3000' + lessonForm.get('DocumentUrl')?.value" target="_blank">
            Vezi documentul existent
          </a>
        </p>
      </div>

      <div class="file-upload-wrapper">
        <input type="file" (change)="onFileSelected($event)" accept=".pdf,.docx,.doc,.pptx,.ppt" />
        <p class="file-hint">Selectează un fișier nou din laptop dacă dorești să îl înlocuiești pe cel actual.</p>
      </div>
    </div>

    <div class="form-group">
      <label>Ordine</label>
      <input 
        type="number" 
        formControlName="OrderIndex" 
        min="1"
        step="1"
        />
    </div>

    <div class="form-actions">
      <button type="button" class="btn-secondary" (click)="goBack()">
        Anulează
      </button>
      <button type="submit" class="btn-primary">
        Salvează modificările
      </button>
    </div>

  </form>
</div>
