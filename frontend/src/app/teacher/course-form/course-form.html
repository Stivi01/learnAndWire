<div class="course-form">
  <h2>Adaugă curs nou</h2>

  <form [formGroup]="courseForm" (ngSubmit)="onSubmit()">
    <div>
      <label>Titlu</label>
      <input formControlName="title" />
    </div>

    <div>
      <label>Descriere</label>
      <textarea formControlName="description"></textarea>
    </div>

    <div>
      <label>Thumbnail URL</label>
      <input formControlName="thumbnailUrl" />
    </div>

    <div class="draft-note">
      Cursul nou se creează ca draft. Îl poți publica după ce adaugi descriere, module și lecții.
    </div>

    <button type="submit" [disabled]="courseForm.invalid">Creează curs</button>
  </form>
</div>
