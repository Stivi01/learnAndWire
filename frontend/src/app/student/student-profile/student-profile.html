<div class="settings-page">
  <h1>Setări profil</h1>

  <div *ngIf="isLoading()">Se încarcă...</div>

  <div *ngIf="!isLoading()">

    <div class="avatar-section">
      <img 
        [src]="profile().avatar === 'assets/avatar-default.png'
              ? 'assets/avatar-default.png' 
              : 'http://localhost:3000/' + profile().avatar" 
        class="avatar-preview">


      <input type="file" (change)="uploadAvatar($event)">
    </div>

    <div class="form-group">
      <label>Prenume</label>
      <input [(ngModel)]="profile().firstName" type="text" />
    </div>

    <div class="form-group">
      <label>Nume</label>
      <input [(ngModel)]="profile().lastName" type="text" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input [(ngModel)]="profile().email" type="email" disabled />
    </div>

    <div class="form-group">
      <label>An universitar</label>
      <input [(ngModel)]="profile().academicYear" type="text" />
    </div>

    <div class="form-group">
      <label>Telefon</label>
      <input [(ngModel)]="profile().phone" type="text" />
    </div>

    <div class="form-group">
      <label>Adresă</label>
      <input [(ngModel)]="profile().address" type="text" />
    </div>

    <button (click)="saveProfile()">Salvează modificările</button>

    <div *ngIf="profile().updatedAt" class="updated-at">
      Ultima actualizare: {{ profile().updatedAt | date:'dd/MM/yyyy HH:mm':'UTC' }}
    </div>
    <div *ngIf="profile().lastLogin" class="updated-at">
      Ultima autentificare: {{ profile().lastLogin | date:'dd/MM/yyyy HH:mm':'UTC' }}
    </div>

    <!-- Change Password Section -->
    <app-change-password-settings></app-change-password-settings>

    <!-- Recovery Codes Settings Section -->
    <app-recovery-codes-settings></app-recovery-codes-settings>

  </div>
</div>
