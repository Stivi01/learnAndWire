<div class="quizzes-container">
  <h2>Testele Mele (Quiz-uri)</h2>

  <div *ngIf="loading()" class="loading-state">Se încarcă testele...</div>
  <div *ngIf="error()" class="error-state">{{ error() }}</div>

  <div *ngIf="!loading() && quizzes().length === 0" class="empty-state">
    Momentan nu ai niciun test disponibil.
  </div>

  <div class="quizzes-grid" *ngIf="quizzes().length > 0">
    <div class="quiz-card" *ngFor="let quiz of quizzes()">
      <div class="quiz-header">
        <span class="course-badge">{{ quiz.courseTitle }}</span>
      </div>
      
      <h3>{{ quiz.title }}</h3>
      <p class="desc">{{ quiz.description || 'Fără descriere.' }}</p>
      
      <div class="quiz-meta">
        <small *ngIf="quiz.scheduledAt">
          📅 Programat: {{ quiz.scheduledAt | date:'short' }}
        </small>
      </div>

     <div class="quiz-actions">
        <button 
            *ngIf="quiz.hasTaken === 0" 
            class="btn-start" 
            (click)="startQuiz(quiz)">
            Începe Testul
            </button>

            <button 
            *ngIf="quiz.hasTaken > 0" 
            class="btn-taken" 
            disabled>
            Test Susținut (Scor: {{ quiz.userScore }})
            </button>
      </div>
    </div>
  </div>
</div>
